#file: noinspection KubernetesUnknownResourcesInspection
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HBTGmbH/argo-values.git
    targetRevision: HEAD
    path: examples/helm/app-sets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true